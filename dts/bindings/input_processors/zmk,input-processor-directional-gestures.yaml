description: Input Processor for invoking behaviors from relative X/Y direction gestures

compatible: "zmk,input-processor-directional-gestures"

include: ip_one_param.yaml

properties:
  type:
    type: int
  x-code:
    type: int
    required: true
  y-code:
    type: int
    required: true
  cooldown-ms:
    type: int
    default: 250
  bindings:
    type: phandle-array
    required: true
